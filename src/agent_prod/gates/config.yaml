alerts:
  alert_on: gategate7
  enabled: true
  webhook_url: https://hooks.example.com/alert
gates:
  auto_fix:
    cooldown_minutes: 5
    enabled: true
    max_retries: 3
    stage_error_threshold: 0.02
    stage_min_duration_seconds: 0.1
    stages:
      '1':
        label: 1%
        observe_cycles: 2
        traffic_pct: 1
      '2':
        label: 10%
        observe_cycles: 4
        traffic_pct: 10
      '3':
        label: 50%
        observe_cycles: 6
        traffic_pct: 50
      '4':
        label: 100%
        observe_cycles: 0
        traffic_pct: 100
    stateful: true
  gate0:
    agent_acl: {}
    per_agent:
      architect-agent:
        mode: observe
      claude-code:
        mode: observe
      code-reviewer:
        mode: observe
      coder-agent:
        mode: observe
      data-analyzer:
        mode: observe
      data-cleaner:
        mode: observe
      data-collector:
        mode: observe
      malicious-agent:
        mode: observe
      qa-simple-tester:
        mode: observe
      qclaw:
        mode: observe
      regression-test-agent:
        mode: observe
      reviewer-agent:
        mode: observe
    skip_arg_inspection: false
  gate1:
    budgets:
      claude-code:
        time_budget_ms: 600000
        token_budget: 20000
      codex:
        time_budget_ms: 600000
        token_budget: 15000
      default:
        time_budget_ms: 9000000
        token_budget: 10000
      hermes:
        time_budget_ms: 8755070
        token_budget: 9972
      opencode:
        time_budget_ms: 600000
        token_budget: 15000
      qclaw:
        time_budget_ms: 14400000
        token_budget: 2000000
    circuit_breaker_cooldown_seconds: 60.0
    consecutive_failures_before_escalation: 3
    execution_time_tolerance: 1.2
    token_tolerance: 1.1
  gate3:
    auto_evolve_baseline: true
    baseline_min_samples: 5
    baseline_window: 20
    dynamic_baseline: true
    per_agent:
      claude-code:
        perf_degradation_limit: 0.05
        regress_pct: 0.97
      codex:
        perf_degradation_limit: 0.05
        regress_pct: 0.95
      hermes:
        perf_degradation_limit: 0.08
        regress_pct: 0.93
      opencode:
        perf_degradation_limit: 0.06
        regress_pct: 0.95
    perf_degradation_limit: 0.05
    regress_pct: 0.95
    repeatability_runs: 3
    repeatability_threshold: 0.1
    unstable_retry_count: 5
  gate4:
    error_rate_increase: 0.01
    latency_increase: 0.1
    resource_increase: 0.15
    stable_period_seconds: 60
  gate5:
    mode: observe  # enforce | observe — observe 模式跳过人工审批
    skip_human_approval: true
  gate6:
    enabled: true
    evaluator: checklist
    fallback_on_timeout: pass
    llm_endpoint: https://ai-api-gateway.app.baizhi.cloud/api/openai
    llm_model: lite/qwen-flash
    pass_threshold: 0.58
    per_agent:
      claude-code:
        pass_threshold: 0.67
      codex:
        pass_threshold: 0.58
      hermes:
        pass_threshold: 0.58
      opencode:
        pass_threshold: 0.58
    timeout_seconds: 60.0
  gate7:
    mode: observe
    per_agent:
      long-running-agent:
        mode: enforce
  mode: memory
flywheel:
  log_path: ${PROJECT_ROOT:-.}/data/execution_log.jsonl
logging:
  format: json
  level: INFO
  output: stdout
observability:
  metrics:
    prometheus_url: http://localhost:9090
    provider: demo
    timeout_seconds: 5.0
  otel:
    enabled: false
    endpoint: http://localhost:4317
    service_name: agent-prod
sandbox:
  path_blacklist:
  - /etc/passwd
  - /etc/shadow
  - /etc/sudoers
  path_whitelist:
  - /tmp/
  - /var/tmp/
storage:
  backend: file  # memory | file | postgres
  file_path: ${PROJECT_ROOT:-.}/data/improvements.json
  postgres:
    dsn: postgresql://quality_gates:quality_gates_dev@localhost:5432/quality_gates
    pool_size: 5
tools:
  aliases:
    claude-code:
      Agent: delegate_task
      Bash: terminal
      Edit: patch
      Read: read_file
      TaskCreate: todo
      Think: todo
      Write: write_file
    codex:
      bash: terminal
      read: read_file
      write: write_file
    qclaw:
      edit: patch
      exec: terminal
      read: read_file
      write: write_file
  risk:
    benign:
    - read_file
    - search_files
    - session_search
    - skills_list
    - skill_view
    - memory
    - vision_analyze
    - browser_navigate
    - browser_snapshot
    - browser_console
    - browser_vision
    - browser_get_images
    - browser_scroll
    - browser_back
    - web_search
    - process_poll
    - process_log
    - process_list
    - process
    - todo
    - execute_code
    dangerous:
    - terminal
    - shell_exec
    - process_kill
    - process_wait
    - process_submit
    - process_write
    - process_close
    - send_message
    - delegate_task
    - cronjob
    - clarify
    elevated:
    - write_file
    - patch
    - skill_manage
    - browser_click
    - browser_type
    - browser_press
    - text_to_speech
