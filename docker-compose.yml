# agent-prod 一键部署 — Docker Compose + PostgreSQL + MCP Server
# 使用：docker compose up -d
# 访问：http://localhost:8000/health

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quality_gates
      POSTGRES_PASSWORD: quality_gates_dev
      POSTGRES_DB: quality_gates
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quality_gates"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-prod:latest
    ports:
      - "8000:8000"
    environment:
      - QUALITY_GATES_MODE=production
      - QUALITY_GATES_ENABLED=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - STORAGE_BACKEND=postgres
      - STORAGE_POSTGRES_DSN=postgresql://quality_gates:quality_gates_dev@postgres:5432/quality_gates
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # MCP Server (stdio mode) — 通过 STDIO 暴露给宿主机
  # Claude Desktop 配置指向本地 agent-prod-mcp 进程即可，
  # 此 service 为 HTTP/SSE 模式部署提供备选方案
  agent-prod-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-prod:latest
    ports:
      - "9000:9000"
    environment:
      - QUALITY_GATES_MODE=production
      - STORAGE_BACKEND=postgres
      - STORAGE_POSTGRES_DSN=postgresql://quality_gates:quality_gates_dev@postgres:5432/quality_gates
      - MCP_HTTP_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    depends_on:
      - agent-prod
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/agent_prod_overview.json
    volumes:
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafdata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafdata: